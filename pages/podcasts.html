<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Podcasts - Jiří Mlčoušek</title>
  <link rel="stylesheet" href="../assets/styles/main.css" />
  <link rel="stylesheet" href="../assets/styles/podcasts.css" />
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="podcasts-page" data-root="..">
  <div id="navbar-placeholder"></div>

  <div class="media-page-shell page-shell">
    <header class="media-page-header">
      <div class="media-page-title-row">
        <h1>Podcast Log</h1>
        <span id="episode-count" class="media-count-badge">0 episodes</span>
      </div>
      <p id="podcast-note" class="media-note">Cover images and descriptions sourced from Spotify and other platforms when available.</p>
    </header>

    <nav id="podcast-filters" class="filter-bar" aria-label="Podcast filters">
      <button class="filter-chip active" data-filter="all">All</button>
      <button class="filter-chip" data-filter="spotify">Spotify</button>
      <button class="filter-chip" data-filter="youtube">YouTube</button>
      <button class="filter-chip" data-filter="2026">2026</button>
      <button class="filter-chip" data-filter="2025">2025</button>
    </nav>

    <div id="podcast-controls" class="media-controls">
      <div class="control-group">
        <label for="podcast-show" class="control-label">Show</label>
        <select id="podcast-show" class="control-select">
          <option value="all">All shows</option>
        </select>
      </div>
      <div class="control-group">
        <label for="podcast-tag" class="control-label">Tag</label>
        <select id="podcast-tag" class="control-select">
          <option value="all">All tags</option>
        </select>
      </div>
      <button id="podcast-clear" class="control-clear">Clear filters</button>
    </div>
  </div>

  <main id="podcast-grid" class="podcasts" aria-label="List of podcasts"></main>

  <div class="media-footer-meta">
    <small id="podcast-last-updated" class="last-updated">Last updated: —</small>
  </div>

  <div id="footer-placeholder"></div>

  <script src="../scripts/main.js"></script>
  <script src="../scripts/podcasts.js"></script>
</body>
</html>
