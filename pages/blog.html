<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Blog - Jiří Mlčoušek</title>
  <link rel="stylesheet" href="../assets/styles/main.css" />
  <link rel="stylesheet" href="../assets/styles/blog.css" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="blog-page" data-root="..">
  <div id="navbar-placeholder"></div>

  <main class="blog-wrapper page-shell">
    <header class="page-hero">
      <h1 id="blog-title">Blog</h1>
      <p id="blog-intro">Short updates, thoughts and progress notes. The newest appear first.</p>
    </header>

    <section class="blog-latest-section" aria-labelledby="latest-heading">
      <h2 id="latest-heading" class="section-label">Latest Posts</h2>
      <div class="posts-grid" id="latest-posts"></div>
    </section>

    <hr class="divider">

    <section class="archive-section" aria-labelledby="archive-heading">
      <h2 id="archive-heading">All Posts</h2>
      <ul class="all-posts-list" id="all-posts"></ul>
    </section>
  </main>

  <div id="footer-placeholder"></div>
  <script src="../scripts/main.js"></script>
  <script src="../scripts/posts.js"></script>
</body>
</html>
