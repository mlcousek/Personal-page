<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Blog - Jiří Mlčoušek</title>
  <link rel="stylesheet" href="../assets/styles/main.css" />
  <link rel="stylesheet" href="../assets/styles/blog.css" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="blog-page" data-root="..">
  <div id="navbar-placeholder"></div>

  <main class="blog-wrapper page-shell">
    <header class="blog-header">
      <span class="blog-eyebrow">Running · Academic · Life</span>
      <h1>Blog</h1>
      <p class="blog-lead">Race reports, academic milestones and progress notes.</p>
    </header>

    <section class="blog-latest-section" aria-labelledby="latest-heading">
      <h2 id="latest-heading" class="section-label">Latest Posts</h2>
      <div class="posts-grid" id="latest-posts"></div>
    </section>

    <hr class="divider">

    <section class="archive-section" aria-labelledby="archive-heading">
      <h2 id="archive-heading">All Posts</h2>
      <ul class="all-posts-list" id="all-posts"></ul>
    </section>
  </main>

  <!-- ── Post modal ── -->
  <div class="post-modal-backdrop" id="post-modal-backdrop" role="presentation">
    <div class="post-modal" role="dialog" aria-modal="true" aria-labelledby="post-modal-title" tabindex="-1">
      <button class="post-modal-close" id="post-modal-close" aria-label="Close">✕</button>
      <p class="post-modal-meta" id="post-modal-meta"></p>
      <h2 class="post-modal-title" id="post-modal-title"></h2>
      <div class="post-modal-body" id="post-modal-body"></div>
    </div>
  </div>

  <div id="footer-placeholder"></div>
  <script src="../scripts/main.js"></script>
  <script src="../scripts/posts.js"></script>
</body>
</html>
